<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>StudyBuddies</title>

    <meta
        name="description"
        content="Find study partners for any subject."
    >

    <meta
        name="theme-color"
        content="#4f46e5"
    >

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="style.css"
    >

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script
        async
        crossorigin="anonymous"
        src="https://unpkg.com/@clerk/clerk-js@latest/dist/clerk.browser.js"
    ></script>
</head>

<body>

<div id="toastContainer"></div>

<header class="topbar">

    <div class="logo">

        <div class="logoIcon">
            📚
        </div>

        <div>

            <h1>StudyBuddies</h1>

            <p>
                Find people to study with.
            </p>

        </div>

    </div>

    <div class="topbarActions">

        <button
            id="themeToggle"
            class="iconButton"
            title="Toggle theme"
        >
            🌙
        </button>

    </div>

</header>

<main class="layout">

    <aside class="sidebar">

        <section class="card">

            <h2>
                Account
            </h2>

            <div id="authContainer">

                <div class="loading">
                    Loading authentication...
                </div>

            </div>

        </section>

        <section class="card">

            <h2>
                Search
            </h2>

            <input
                id="searchInput"
                class="input"
                type="text"
                placeholder="Search usernames or topics..."
            >

        </section>

    </aside>

    <section class="content">

        <section class="card">

            <div class="sectionHeader">

                <h2>
                    Your Profile
                </h2>

                <span
                    id="profileStatus"
                    class="badge"
                >
                    Signed Out
                </span>

            </div>

            <form
                id="profileForm"
                autocomplete="off"
            >

                <div class="grid2">

                    <div>

                        <label>
                            Username
                        </label>

                        <input
                            id="username"
                            class="input"
                            type="text"
                            required
                        >

                    </div>

                    <div>

                        <label>
                            Name
                        </label>

                        <input
                            id="name"
                            class="input"
                            type="text"
                        >

                    </div>

                </div>

                <label>
                    Bio
                </label>

                <textarea
                    id="bio"
                    class="textarea"
                    rows="5"
                ></textarea>

                <label>
                    Topics
                </label>

                <input
                    id="topics"
                    class="input"
                    type="text"
                    placeholder="math, chemistry, history"
                >

                <div class="contactHeader">

                    <label>
                        Contact Methods
                    </label>

                    <button
                        id="addContact"
                        type="button"
                        class="primaryButton"
                    >
                        + Add Contact
                    </button>

                </div>

                <div id="contactList">

                </div>

                <div class="buttonRow">

                    <button
                        id="saveProfile"
                        class="primaryButton"
                        type="submit"
                    >
                        Save Profile
                    </button>

                    <button
                        id="clearProfile"
                        class="secondaryButton"
                        type="button"
                    >
                        Clear
                    </button>

                </div>

            </form>

        </section>

        <section class="card">

            <div class="sectionHeader">

                <h2>
                    StudyBuddies
                </h2>

                <span
                    id="profileCount"
                    class="badge"
                >
                    0
                </span>

            </div>

            <div
                id="profilesGrid"
                class="profilesGrid"
            >

                <div class="loading">

                    Loading StudyBuddies...

                </div>

            </div>

        </section>

    </section>

</main>

<template id="contactTemplate">

    <div class="contactRow">

        <select class="contactType">

            <option value="discord">Discord</option>

            <option value="email">Email</option>

            <option value="telegram">Telegram</option>

            <option value="reddit">Reddit</option>

            <option value="instagram">Instagram</option>

            <option value="snapchat">Snapchat</option>

            <option value="phone">Phone</option>

            <option value="other">Other</option>

        </select>

        <input
            class="contactValue"
            type="text"
            placeholder="Username or address"
        >

        <button
            type="button"
            class="removeContact"
            title="Remove"
        >
            ✕
        </button>

    </div>

</template>

<script src="app.js"></script>

</body>
</html>
